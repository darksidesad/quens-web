services:
  quenns:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-secret-min-32-chars}
      - NODE_ENV=production
    volumes:
      - quenns-data:/data

volumes:
  quenns-data:
